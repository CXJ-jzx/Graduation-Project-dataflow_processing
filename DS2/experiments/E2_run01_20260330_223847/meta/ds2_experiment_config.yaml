# ds2_experiment_config.yaml

flink:
  rest_url: "http://192.168.56.151:8081"
  flink_home: "/opt/app/flink-1.17.2"
  jar_path: "/opt/flink_jobs/flink-rocketmq-demo-1.0-SNAPSHOT.jar"
  main_class: "org.jzx.SeismicStreamJob"
  job_name: "SeismicStreamJob"

ssh:
  host: "192.168.56.151"
  port: 22
  user: "root"
  password: "123456"

rocketmq:
  home: "/usr/local/rocketmq"
  cluster: "RaftCluster"
  namesrv_addr: "192.168.56.151:9876"
  consumer_group_prefix: "seismic-flink-consumer-group"
  deregister_wait_seconds: 15
  cleanup_old_consumer_group: true

producer:
  main_class: "org.jzx.producer.HighThroughputSeismicProducer"
  local_jar: "../target/flink-rocketmq-demo-1.0-SNAPSHOT.jar"
  work_dir: ".."
  namesrv_addr: "192.168.56.151:9876"

ds2_controller:
  script_path: "ds2_controller.py"
  config_path: "ds2_config.yaml"

# ============================================================
# 实验定义
# ============================================================
experiments:

  # ──────────────────────────────────────────────
  # E1: DS2 扩容实验 — 恒定高负载
  # ──────────────────────────────────────────────
  E1:
    name: "DS2扩容实验-恒定高负载"
    ds2_enabled: true
    duration_seconds: 900
    warmup_before_ds2: 30
    drain_seconds: 60
    parallelism:
      p-source: 2
      p-filter: 2
      p-signal: 2
      p-feature: 2
      p-grid: 2
      p-sink: 1
    load_profile:
      - name: "恒定高负载"
        rate: 6000
        duration: 900

  # ──────────────────────────────────────────────
  # C1: E1 的对照 — 同负载同初始并行度，不开 DS2
  # ──────────────────────────────────────────────
  C1:
    name: "对照实验-固定并行度"
    ds2_enabled: false
    duration_seconds: 900
    warmup_before_ds2: 0
    drain_seconds: 60
    parallelism:
      p-source: 2
      p-filter: 2
      p-signal: 2
      p-feature: 2
      p-grid: 2
      p-sink: 1
    load_profile:
      - name: "恒定高负载"
        rate: 6000
        duration: 900

  # ──────────────────────────────────────────────
  # E2: DS2 缩容实验 — 低负载
  # ──────────────────────────────────────────────
  E2:
    name: "缩容实验"
    description: "低负载恒定输入，验证DS2缩容能力"
    ds2_enabled: true
    duration_seconds: 600
    warmup_before_ds2: 30
    drain_seconds: 60
    repeat: 1
    parallelism:
      p-source: 6
      p-filter: 8
      p-signal: 8
      p-feature: 4
      p-grid: 4
      p-sink: 2
    load_profile:
      - name: "low_pressure"
        rate: 2000
        duration: 600

  # ──────────────────────────────────────────────
  # C2: E2 的对照 — 同负载同高配，不开 DS2
  # ──────────────────────────────────────────────
  C2:
    name: "静态高配对照"
    description: "与E2同负载同初始并行度，不启动DS2"
    ds2_enabled: false
    duration_seconds: 600
    warmup_before_ds2: 0
    drain_seconds: 60
    repeat: 1
    parallelism:
      p-source: 6
      p-filter: 8
      p-signal: 8
      p-feature: 4
      p-grid: 4
      p-sink: 2
    load_profile:
      - name: "low_pressure"
        rate: 2000
        duration: 600

  # ──────────────────────────────────────────────
  # E3: 动态波动实验
  #
  # 关键修改：每阶段 300s → 600s
  # 原因：单次伸缩完整周期 ~350-400s
  #   决策积累:  4 × 15s = 60s
  #   执行停机:  ~20s
  #   状态恢复:  ~60-120s
  #   消化积压:  ~60-100s
  #   冷却保护:  180s
  #   合计:      ~380s
  #
  # 每阶段 600s 可以保证：
  #   伸缩 1 次 (~380s) + 稳态运行观察 (~220s) ✅
  # ──────────────────────────────────────────────
  E3:
    name: "动态波动实验"
    description: "负载波动，验证DS2双向调节与防振荡。每阶段600s确保收敛。"
    ds2_enabled: true
    duration_seconds: 1800          # 3 × 600s = 1800s（30分钟）
    warmup_before_ds2: 30
    drain_seconds: 60
    repeat: 1
    parallelism:
      p-source: 4
      p-filter: 3
      p-signal: 3
      p-feature: 2
      p-grid: 2
      p-sink: 1
    load_profile:
      - name: "low_phase"
        rate: 2000
        duration: 600               # 300 → 600
      - name: "high_phase"
        rate: 6000
        duration: 600               # 300 → 600
      - name: "low_phase_2"
        rate: 2000
        duration: 600               # 300 → 600

  # ──────────────────────────────────────────────
  # C3: E3 的对照 — 同负载波动，固定中等并行度，不开 DS2
  # ──────────────────────────────────────────────
  C3:
    name: "动态波动对照"
    description: "与E3同负载同初始并行度，不启动DS2，观察固定配置下的表现"
    ds2_enabled: false
    duration_seconds: 1800
    warmup_before_ds2: 0
    drain_seconds: 60
    repeat: 1
    parallelism:
      p-source: 4
      p-filter: 3
      p-signal: 3
      p-feature: 2
      p-grid: 2
      p-sink: 1
    load_profile:
      - name: "low_phase"
        rate: 2000
        duration: 600
      - name: "high_phase"
        rate: 6000
        duration: 600
      - name: "low_phase_2"
        rate: 2000
        duration: 600

# ============================================================
# 指标采集
# ============================================================
metrics:
  collect_interval: 10
