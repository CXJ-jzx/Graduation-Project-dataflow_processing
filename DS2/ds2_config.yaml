# =========================
# DS2 Configuration File
# ★ P10: 高负载保护 + 加强方向锁
# =========================

flink:
  rest_url: "http://192.168.56.151:8081"
  job_name: "Seismic-Stream-Job"
  savepoint_dir: "hdfs://node01:9000/flink/savepoints"

ds2:
  policy_interval: 15
  warm_up_time: 120
  activation_window: 2
  target_rate_ratio: 1.3
  min_busy_ratio: 0.05
  idle_busy_threshold: 0.15
  max_parallelism: 8
  min_parallelism: 2
  change_threshold: 0
  target_jar_name: "flink-rocketmq-demo-1.0-SNAPSHOT"

  max_scale_factor: 3.0
  recovery_busy_threshold: 0.95
  recovery_throughput_min: 100.0
  min_significant_busy: 0.30
  initial_grace_period: 60

  source_capacity_per_instance: 2000
  source_max_parallelism: 8

  use_savepoint: true
  wait_running_timeout: 90

  # P8 方向锁 ★ P10: 180 → 300
  direction_lock_seconds: 300
  post_restart_skip_rounds: 3

  # P9 累计冷却 ★ P10: penalty 120 → 180
  consecutive_scale_limit: 2
  consecutive_scale_penalty: 180

  # ★ P10 新增: 高负载保护
  # 当 Source 吞吐 >= source_capacity_per_instance * source_parallelism * 此比例时
  # 禁止一切缩容 (认为系统正在有效工作, 不值得为了省资源而重启)
  high_load_protection_ratio: 0.70

operator_mapping:
  source:
    keyword: "RocketMQ-Source"
    arg_name: "p-source"
    default_parallelism: 2

  watermark:
    keyword: "Watermark-Assigner"
    arg_name: "p-source"
    default_parallelism: 2

  filter:
    keyword: "Hardware-Filter"
    arg_name: "p-filter"
    default_parallelism: 2

  signal:
    keyword: "Signal-Extraction"
    arg_name: "p-signal"
    default_parallelism: 2

  feature:
    keyword: "Feature-Extraction"
    arg_name: "p-feature"
    default_parallelism: 2

  grid:
    keyword: "Grid-Aggregation"
    arg_name: "p-grid"
    default_parallelism: 2

  sink_event:
    keyword: "EventFeature-Sink"
    arg_name: "p-sink"
    default_parallelism: 1

  sink_grid:
    keyword: "GridSummary-Sink"
    arg_name: "p-sink"
    default_parallelism: 1

logging:
  level: "INFO"
