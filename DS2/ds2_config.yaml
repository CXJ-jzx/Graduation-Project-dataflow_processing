# =========================
# DS2 Configuration File
# =========================

flink:
  # JobManager REST API 地址
  rest_url: "http://192.168.56.151:8081"

  # Flink 作业名称（必须与 SeismicStreamJob.JOB_NAME 完全一致）
  job_name: "Seismic-Stream-Job"

  # Savepoint 目录
  savepoint_dir: "hdfs://node01:9000/flink/savepoints"


# =========================
# DS2 Core Parameters
# =========================
ds2:
  # 决策周期（秒）
  policy_interval: 15

  # 扩缩容后的冷却/预热时间（秒）
  warm_up_time: 60

  # 连续 N 次决策一致才执行
  activation_window: 3

  # 目标处理能力冗余比例（安全余量）
  target_rate_ratio: 1.8

  # 最小忙碌比（防止除 0）
  min_busy_ratio: 0.05

  max_parallelism: 8

  min_parallelism: 1


  # 并行度变化阈值（避免频繁 +1/-1）
  change_threshold: 0

  # 重启作业所需 JAR 包名称关键字（用于在已上传的 JAR 列表中匹配）
  target_jar_name: "flink-rocketmq-demo-1.0-SNAPSHOT"


# =========================
# 算子名称映射
# =========================
# 将 Flink DAG 中的算子名（vertex name）映射到命令行参数名
# Flink REST API 返回的 vertex name 可能包含完整的链路描述
# 这里配置的是"包含匹配"关键字
operator_mapping:
  source:
    keyword: "RocketMQ-Source"           # 匹配 "Source: RocketMQ-Source -> Watermark-Assigner"
    arg_name: "p-source"
    default_parallelism: 1

  filter:
    keyword: "Hardware-Filter"           # 匹配 "Hardware-Filter"
    arg_name: "p-filter"
    default_parallelism: 2

  signal:
    keyword: "Signal-Extraction"         # 匹配 "Signal-Extraction"
    arg_name: "p-signal"
    default_parallelism: 2

  feature:
    keyword: "Feature-Extraction"        # 匹配 "Feature-Extraction"
    arg_name: "p-feature"
    default_parallelism: 2

  grid:
    keyword: "Grid-Aggregation"          # 匹配 "Grid-Aggregation"
    arg_name: "p-grid"
    default_parallelism: 2

  sink_event:
    keyword: "EventFeature-Sink"         # 匹配 "Sink: EventFeature-Sink"
    arg_name: "p-sink"
    default_parallelism: 1

  sink_grid:
    keyword: "GridSummary-Sink"          # 匹配 "Sink: GridSummary-Sink"
    arg_name: "p-sink"
    default_parallelism: 4



# =========================
# Logging
# =========================
logging:
  level: "INFO"
